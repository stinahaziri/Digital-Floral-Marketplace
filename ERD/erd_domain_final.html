
<style>
#e2 svg{width:100%}
#e2 svg.erDiagram .row-rect-odd path,#e2 svg.erDiagram .row-rect-odd rect,
#e2 svg.erDiagram .row-rect-even path,#e2 svg.erDiagram .row-rect-even rect{stroke:none!important}
</style>
<div style="font-family:var(--font-sans);font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">ERD — 17 Tabelat Domain (27 gjithsej)</div>
<div id="e2"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark=matchMedia('(prefers-color-scheme:dark)').matches;
await document.fonts.ready;
mermaid.initialize({startOnLoad:false,theme:'base',fontFamily:'"Anthropic Sans",sans-serif',
themeVariables:{darkMode:dark,fontSize:'11px',fontFamily:'"Anthropic Sans",sans-serif',
lineColor:dark?'#9c9a92':'#73726c',textColor:dark?'#c2c0b6':'#3d3d3a'}});
const {svg}=await mermaid.render('e2svg',`erDiagram
Florists{int id PK
int user_id FK
string shop_name
string city
decimal rating
bit is_verified
datetime created_at}
ProductCategories{int id PK
string name
string slug}
FlowerProducts{int id PK
int florist_id FK
int category_id FK
string name
decimal price
string color
string occasion
bit is_available}
ProductTags{int id PK
int product_id FK
string tag}
Inventory{int id PK
int product_id FK
int quantity
int low_stock_threshold}
DeliveryAddresses{int id PK
int user_id FK
string street
string city
bit is_default}
DeliverySlots{int id PK
int florist_id FK
string day_of_week
time start_time
time end_time
int max_orders}
Orders{int id PK
int customer_id FK
int florist_id FK
int address_id FK
string status
decimal total_amount
datetime delivery_date}
OrderItems{int id PK
int order_id FK
int product_id FK
int quantity
decimal unit_price}
Wishlists{int id PK
int user_id FK
int product_id FK
datetime added_at}
Subscriptions{int id PK
int user_id FK
int product_id FK
string frequency
datetime next_delivery}
CustomBouquets{int id PK
int user_id FK
string name
nvarchar flowers_json
nvarchar decorations_json
string wrapping_color
string ribbon_color
decimal total_price
bit is_ordered}
PaymentTransactions{int id PK
int order_id FK
string stripe_payment_id
decimal amount
string status}
Coupons{int id PK
string code
decimal discount_percent
datetime expires_at}
OrderCoupons{int id PK
int order_id FK
int coupon_id FK
decimal discount_applied}
AiRecommendations{int id PK
int user_id FK
int product_id FK
decimal score
string reason}
ChatbotLogs{int id PK
int user_id FK
string session_id
nvarchar user_message
nvarchar ai_response}
Florists||--o{FlowerProducts:sells
Florists||--o{DeliverySlots:offers
Florists||--o{Orders:receives
ProductCategories||--o{FlowerProducts:categorizes
FlowerProducts||--o{ProductTags:has
FlowerProducts||--||Inventory:tracks
FlowerProducts||--o{OrderItems:included_in
FlowerProducts||--o{AiRecommendations:recommended
FlowerProducts||--o{Wishlists:saved_in
Orders||--o{OrderItems:contains
Orders||--o{PaymentTransactions:paid_via
Orders||--o{OrderCoupons:uses
Coupons||--o{OrderCoupons:applied_in
DeliverySlots||--o{Orders:scheduled_for
DeliveryAddresses||--o{Orders:delivers_to`);
document.getElementById('e2').innerHTML=svg;
document.querySelectorAll('#e2 svg.erDiagram .node').forEach(n=>{
const fp=n.querySelector('path[d]');if(!fp)return;
const nums=fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
if(!nums||nums.length<8)return;
const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
for(const a of['fill','stroke','stroke-width','class','style'])if(fp.hasAttribute(a))r.setAttribute(a,fp.getAttribute(a));
fp.replaceWith(r);});
</script>
